name: Particle Sensitivity Benchmark

on:
  workflow_dispatch:
    inputs:
      grid_sizes:
        description: Space-separated S3F grid sizes.
        required: true
        default: "8 16 32 64"
        type: string
      particle_counts:
        description: Space-separated bootstrap particle-filter particle counts.
        required: true
        default: "128 256 512 1024 2048 4096 8192"
        type: string
      trials:
        description: Number of synthetic trials.
        required: true
        default: 64
        type: number
      steps:
        description: Number of prediction/update steps per trial.
        required: true
        default: 30
        type: number
      retention_days:
        description: Number of days to retain the uploaded Actions artifact.
        required: true
        default: 30
        type: number

permissions:
  contents: read

jobs:
  particle-sensitivity:
    name: Run particle sensitivity benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GRID_SIZES: ${{ inputs.grid_sizes }}
      PARTICLE_COUNTS: ${{ inputs.particle_counts }}
      TRIALS: ${{ inputs.trials }}
      STEPS: ${{ inputs.steps }}
      OUTPUT_DIR: results/particle_sensitivity

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run particle sensitivity benchmark
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys

          grid_sizes = os.environ["GRID_SIZES"].split()
          particle_counts = os.environ["PARTICLE_COUNTS"].split()
          for label, values in {"grid_sizes": grid_sizes, "particle_counts": particle_counts}.items():
              if not values:
                  raise ValueError(f"{label} must not be empty.")
              if any(not value.isdigit() or int(value) <= 0 for value in values):
                  raise ValueError(f"{label} must contain positive integers: {values}")

          trials = int(os.environ["TRIALS"])
          steps = int(os.environ["STEPS"])
          if min(trials, steps) <= 0:
              raise ValueError("trials and steps must be positive.")

          command = [
              sys.executable,
              "-m",
              "se3plusplus_s3f.cli",
              "particle-sensitivity",
              "--grid-sizes",
              *grid_sizes,
              "--particle-counts",
              *particle_counts,
              "--trials",
              str(trials),
              "--steps",
              str(steps),
              "--output-dir",
              os.environ["OUTPUT_DIR"],
          ]
          subprocess.run(command, check=True)
          PY

      - name: Validate sensitivity outputs
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          import os
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          metrics_path = output_dir / "particle_sensitivity_metrics.csv"
          metadata_path = output_dir / "run_metadata.json"
          note_path = output_dir / "particle_sensitivity_note.md"

          for required_path in (metrics_path, metadata_path, note_path):
              if not required_path.exists():
                  raise FileNotFoundError(required_path)

          rows = list(csv.DictReader(metrics_path.open(newline="", encoding="utf-8")))
          grid_sizes = os.environ["GRID_SIZES"].split()
          particle_counts = os.environ["PARTICLE_COUNTS"].split()
          expected_rows = 3 * len(grid_sizes) + len(particle_counts)
          if len(rows) != expected_rows:
              raise AssertionError(f"Expected {expected_rows} rows, found {len(rows)}.")

          filters = {row["filter"] for row in rows}
          if filters != {"s3f", "particle_filter"}:
              raise AssertionError(filters)

          seen_particle_counts = {
              row["particle_count"]
              for row in rows
              if row["filter"] == "particle_filter"
          }
          if seen_particle_counts != set(particle_counts):
              raise AssertionError(seen_particle_counts)

          for row_index, row in enumerate(rows):
              values = {
                  "position_rmse": float(row["position_rmse"]),
                  "orientation_mean_error_rad": float(row["orientation_mean_error_rad"]),
                  "coverage_95": float(row["coverage_95"]),
                  "runtime_ms_per_step": float(row["runtime_ms_per_step"]),
              }
              if not all(math.isfinite(value) for value in values.values()):
                  raise AssertionError((row_index, row))
              if not 0.0 <= values["coverage_95"] <= 1.0:
                  raise AssertionError((row_index, row))
              if values["runtime_ms_per_step"] <= 0.0:
                  raise AssertionError((row_index, row))

          metadata_rows = json.loads(metadata_path.read_text(encoding="utf-8"))["metrics_rows"]
          if metadata_rows != len(rows):
              raise AssertionError((metadata_rows, len(rows)))

          print(f"Validated {len(rows)} sensitivity rows in {metrics_path}.")
          PY

      - name: Write benchmark summary
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          note = Path(os.environ["OUTPUT_DIR"]) / "particle_sensitivity_note.md"
          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(note.read_text(encoding="utf-8"), encoding="utf-8")
          PY

      - name: Upload sensitivity artifact
        uses: actions/upload-artifact@v7
        with:
          name: particle-sensitivity-results-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
