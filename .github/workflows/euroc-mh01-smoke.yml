name: EuRoC MH01 Smoke

on:
  push:
    branches:
      - main
    paths:
      - "src/se3plusplus_s3f/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/euroc-mh01-smoke.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/se3plusplus_s3f/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/euroc-mh01-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  EUROC_MH01_URL: https://raw.githubusercontent.com/princeton-vl/DROID-SLAM/main/data/euroc_groundtruth/MH_01_easy.txt
  EUROC_MH01_PATH: data/euroc/MH_01_easy.txt
  EUROC_MH01_SHA256: 7aee4858338a3e880375ee51c18c120c5aa565616d62e9036e994924b31d9c48

jobs:
  euroc-mh01-smoke:
    name: Download cached MH01 trajectory and run planar S3F
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore cached EuRoC trajectory
        id: cache-euroc
        uses: actions/cache@v5
        with:
          path: ${{ env.EUROC_MH01_PATH }}
          key: euroc-mh01-groundtruth-${{ env.EUROC_MH01_SHA256 }}

      - name: Download EuRoC MH01 ground-truth trajectory
        if: steps.cache-euroc.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$(dirname "${EUROC_MH01_PATH}")"
          curl --fail --location --retry 4 --retry-delay 10 \
            --output "${EUROC_MH01_PATH}" \
            "${EUROC_MH01_URL}"

      - name: Verify EuRoC trajectory checksum
        run: |
          echo "${EUROC_MH01_SHA256}  ${EUROC_MH01_PATH}" | sha256sum --check

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run EuRoC planar relaxed S3F smoke
        run: |
          python -m se3plusplus_s3f.cli \
            euroc-planar \
            --groundtruth-path "${EUROC_MH01_PATH}" \
            --grid-size 16 \
            --stride 20 \
            --steps 50 \
            --output-dir ci_smoke/euroc_mh01_planar

      - name: Validate EuRoC smoke metrics
        run: |
          python - <<'PY'
          import csv
          import math
          from pathlib import Path

          metrics_path = Path("ci_smoke/euroc_mh01_planar/euroc_planar_metrics.csv")
          note_path = Path("ci_smoke/euroc_mh01_planar/euroc_planar_note.md")
          assert metrics_path.exists(), metrics_path
          assert note_path.exists(), note_path

          rows = list(csv.DictReader(metrics_path.open(newline="", encoding="utf-8")))
          assert {row["variant"] for row in rows} == {"baseline", "r1", "r1_r2"}
          assert all(int(row["grid_size"]) == 16 for row in rows)
          assert all(int(row["n_steps"]) == 50 for row in rows)

          for row in rows:
              position_rmse = float(row["position_rmse"])
              orientation_error = float(row["orientation_mean_error_rad"])
              coverage = float(row["coverage_95"])
              path_length = float(row["path_length_m"])
              duration = float(row["duration_s"])
              mean_increment = float(row["mean_body_increment_m"])
              runtime = float(row["runtime_ms_per_step"])

              assert math.isfinite(position_rmse)
              assert math.isfinite(orientation_error)
              assert math.isfinite(runtime)
              assert 0.0 <= coverage <= 1.0
              assert 0.0 <= orientation_error <= math.pi
              assert 0.0 < position_rmse < 2.0
              assert path_length > 1.0
              assert duration > 1.0
              assert mean_increment > 0.0
              assert runtime > 0.0

          print("EuRoC smoke rows:", rows)
          PY

      - name: Upload EuRoC smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: se3plusplus-s3f-euroc-mh01-smoke
          path: ci_smoke/euroc_mh01_planar
