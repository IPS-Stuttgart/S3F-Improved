name: Paper Experiment Suite

permissions:
  contents: read

"on":
  workflow_dispatch:
    inputs:
      preset:
        description: Experiment preset. Use smoke for quick validation; paper for paper-grade defaults; custom to use the fields below.
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - paper
          - custom
      s1r2_grid_sizes:
        description: Custom S1/R2 grid sizes, space-separated.
        required: true
        default: "8 16 32 64"
        type: string
      s1r2_reference_grid_size:
        description: Custom S1/R2 high-resolution reference grid size.
        required: true
        default: 256
        type: number
      s1r2_trials:
        description: Custom S1/R2 trials per repeat.
        required: true
        default: 32
        type: number
      s1r2_steps:
        description: Custom S1/R2 prediction/update steps per trial.
        required: true
        default: 20
        type: number
      s1r2_repeats:
        description: Custom S1/R2 repeated quality-cost runs.
        required: true
        default: 20
        type: number
      s1r2_particle_counts:
        description: Custom S1/R2 bootstrap particle-filter counts, space-separated.
        required: true
        default: "128 512 2048 8192"
        type: string
      s3r3_grid_sizes:
        description: Custom S3R3 grid sizes, space-separated.
        required: true
        default: "8 16 32"
        type: string
      s3r3_reference_grid_size:
        description: Custom S3R3 dense-reference grid size.
        required: true
        default: 64
        type: number
      s3r3_trials:
        description: Custom S3R3 evidence-summary trials.
        required: true
        default: 16
        type: number
      s3r3_steps:
        description: Custom S3R3 evidence-summary steps.
        required: true
        default: 8
        type: number
      s3r3_cell_sample_counts:
        description: Custom S3R3 cell-sample convergence counts, space-separated.
        required: true
        default: "9 27 125"
        type: string
      stress_prior_kappas:
        description: Custom S3R3 stress-sweep prior kappas, space-separated.
        required: true
        default: "1.5 3.0 8.0"
        type: string
      stress_body_increment_scales:
        description: Custom S3R3 stress-sweep body-increment scales, space-separated.
        required: true
        default: "0.5 1.0 1.5"
        type: string
      stress_trials:
        description: Custom S3R3 stress-sweep trials per scenario.
        required: true
        default: 8
        type: number
      stress_steps:
        description: Custom S3R3 stress-sweep steps per trial.
        required: true
        default: 5
        type: number
      retention_days:
        description: Days to retain uploaded experiment artifacts.
        required: true
        default: 30
        type: number

concurrency:
  group: paper-experiment-suite-${{ github.ref }}-${{ inputs.preset }}
  cancel-in-progress: false

jobs:
  parameters:
    name: Resolve experiment parameters
    runs-on: ubuntu-latest
    outputs:
      s1r2_grid_sizes: ${{ steps.resolve.outputs.s1r2_grid_sizes }}
      s1r2_reference_grid_size: ${{ steps.resolve.outputs.s1r2_reference_grid_size }}
      s1r2_trials: ${{ steps.resolve.outputs.s1r2_trials }}
      s1r2_steps: ${{ steps.resolve.outputs.s1r2_steps }}
      s1r2_repeats: ${{ steps.resolve.outputs.s1r2_repeats }}
      s1r2_particle_counts: ${{ steps.resolve.outputs.s1r2_particle_counts }}
      s3r3_grid_sizes: ${{ steps.resolve.outputs.s3r3_grid_sizes }}
      s3r3_reference_grid_size: ${{ steps.resolve.outputs.s3r3_reference_grid_size }}
      s3r3_trials: ${{ steps.resolve.outputs.s3r3_trials }}
      s3r3_steps: ${{ steps.resolve.outputs.s3r3_steps }}
      s3r3_primary_cell_sample_count: ${{ steps.resolve.outputs.s3r3_primary_cell_sample_count }}
      s3r3_cell_sample_counts_json: ${{ steps.resolve.outputs.s3r3_cell_sample_counts_json }}
      stress_prior_kappas: ${{ steps.resolve.outputs.stress_prior_kappas }}
      stress_body_increment_scales: ${{ steps.resolve.outputs.stress_body_increment_scales }}
      stress_trials: ${{ steps.resolve.outputs.stress_trials }}
      stress_steps: ${{ steps.resolve.outputs.stress_steps }}
      retention_days: ${{ steps.resolve.outputs.retention_days }}

    steps:
      - name: Resolve preset and validate inputs
        id: resolve
        env:
          PRESET: ${{ inputs.preset }}
          CUSTOM_S1R2_GRID_SIZES: ${{ inputs.s1r2_grid_sizes }}
          CUSTOM_S1R2_REFERENCE_GRID_SIZE: ${{ inputs.s1r2_reference_grid_size }}
          CUSTOM_S1R2_TRIALS: ${{ inputs.s1r2_trials }}
          CUSTOM_S1R2_STEPS: ${{ inputs.s1r2_steps }}
          CUSTOM_S1R2_REPEATS: ${{ inputs.s1r2_repeats }}
          CUSTOM_S1R2_PARTICLE_COUNTS: ${{ inputs.s1r2_particle_counts }}
          CUSTOM_S3R3_GRID_SIZES: ${{ inputs.s3r3_grid_sizes }}
          CUSTOM_S3R3_REFERENCE_GRID_SIZE: ${{ inputs.s3r3_reference_grid_size }}
          CUSTOM_S3R3_TRIALS: ${{ inputs.s3r3_trials }}
          CUSTOM_S3R3_STEPS: ${{ inputs.s3r3_steps }}
          CUSTOM_S3R3_CELL_SAMPLE_COUNTS: ${{ inputs.s3r3_cell_sample_counts }}
          CUSTOM_STRESS_PRIOR_KAPPAS: ${{ inputs.stress_prior_kappas }}
          CUSTOM_STRESS_BODY_INCREMENT_SCALES: ${{ inputs.stress_body_increment_scales }}
          CUSTOM_STRESS_TRIALS: ${{ inputs.stress_trials }}
          CUSTOM_STRESS_STEPS: ${{ inputs.stress_steps }}
          RETENTION_DAYS: ${{ inputs.retention_days }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          def int_list(text: str, name: str) -> list[int]:
              values = [int(token) for token in text.split()]
              if not values or min(values) <= 0:
                  raise ValueError(f"{name} must contain positive integers.")
              return values

          def float_list(text: str, name: str) -> list[float]:
              values = [float(token) for token in text.split()]
              if not values or min(values) <= 0.0:
                  raise ValueError(f"{name} must contain positive values.")
              return values

          def positive_int(value: str, name: str) -> int:
              parsed = int(value)
              if parsed <= 0:
                  raise ValueError(f"{name} must be positive.")
              return parsed

          preset = os.environ["PRESET"]
          if preset == "smoke":
              cfg = {
                  "s1r2_grid_sizes": [8, 16],
                  "s1r2_reference_grid_size": 32,
                  "s1r2_trials": 1,
                  "s1r2_steps": 2,
                  "s1r2_repeats": 1,
                  "s1r2_particle_counts": [32, 64],
                  "s3r3_grid_sizes": [8],
                  "s3r3_reference_grid_size": 16,
                  "s3r3_trials": 1,
                  "s3r3_steps": 2,
                  "s3r3_cell_sample_counts": [9],
                  "stress_prior_kappas": [3.0],
                  "stress_body_increment_scales": [1.0],
                  "stress_trials": 1,
                  "stress_steps": 2,
              }
          elif preset == "paper":
              cfg = {
                  "s1r2_grid_sizes": [8, 16, 32, 64],
                  "s1r2_reference_grid_size": 256,
                  "s1r2_trials": 32,
                  "s1r2_steps": 20,
                  "s1r2_repeats": 20,
                  "s1r2_particle_counts": [128, 512, 2048, 8192],
                  "s3r3_grid_sizes": [8, 16, 32],
                  "s3r3_reference_grid_size": 64,
                  "s3r3_trials": 16,
                  "s3r3_steps": 8,
                  "s3r3_cell_sample_counts": [9, 27, 125],
                  "stress_prior_kappas": [1.5, 3.0, 8.0],
                  "stress_body_increment_scales": [0.5, 1.0, 1.5],
                  "stress_trials": 8,
                  "stress_steps": 5,
              }
          elif preset == "custom":
              cfg = {
                  "s1r2_grid_sizes": int_list(os.environ["CUSTOM_S1R2_GRID_SIZES"], "s1r2_grid_sizes"),
                  "s1r2_reference_grid_size": positive_int(os.environ["CUSTOM_S1R2_REFERENCE_GRID_SIZE"], "s1r2_reference_grid_size"),
                  "s1r2_trials": positive_int(os.environ["CUSTOM_S1R2_TRIALS"], "s1r2_trials"),
                  "s1r2_steps": positive_int(os.environ["CUSTOM_S1R2_STEPS"], "s1r2_steps"),
                  "s1r2_repeats": positive_int(os.environ["CUSTOM_S1R2_REPEATS"], "s1r2_repeats"),
                  "s1r2_particle_counts": int_list(os.environ["CUSTOM_S1R2_PARTICLE_COUNTS"], "s1r2_particle_counts"),
                  "s3r3_grid_sizes": int_list(os.environ["CUSTOM_S3R3_GRID_SIZES"], "s3r3_grid_sizes"),
                  "s3r3_reference_grid_size": positive_int(os.environ["CUSTOM_S3R3_REFERENCE_GRID_SIZE"], "s3r3_reference_grid_size"),
                  "s3r3_trials": positive_int(os.environ["CUSTOM_S3R3_TRIALS"], "s3r3_trials"),
                  "s3r3_steps": positive_int(os.environ["CUSTOM_S3R3_STEPS"], "s3r3_steps"),
                  "s3r3_cell_sample_counts": int_list(os.environ["CUSTOM_S3R3_CELL_SAMPLE_COUNTS"], "s3r3_cell_sample_counts"),
                  "stress_prior_kappas": float_list(os.environ["CUSTOM_STRESS_PRIOR_KAPPAS"], "stress_prior_kappas"),
                  "stress_body_increment_scales": float_list(os.environ["CUSTOM_STRESS_BODY_INCREMENT_SCALES"], "stress_body_increment_scales"),
                  "stress_trials": positive_int(os.environ["CUSTOM_STRESS_TRIALS"], "stress_trials"),
                  "stress_steps": positive_int(os.environ["CUSTOM_STRESS_STEPS"], "stress_steps"),
              }
          else:
              raise ValueError(f"Unknown preset: {preset}")

          if cfg["s1r2_reference_grid_size"] <= max(cfg["s1r2_grid_sizes"]):
              raise ValueError("S1/R2 reference grid size must exceed all S1/R2 grid sizes.")
          if cfg["s3r3_reference_grid_size"] <= max(cfg["s3r3_grid_sizes"]):
              raise ValueError("S3R3 reference grid size must exceed all S3R3 grid sizes.")

          retention_days = positive_int(os.environ["RETENTION_DAYS"], "retention_days")
          primary_cell_sample = 27 if 27 in cfg["s3r3_cell_sample_counts"] else cfg["s3r3_cell_sample_counts"][0]

          outputs = {
              "s1r2_grid_sizes": " ".join(str(value) for value in cfg["s1r2_grid_sizes"]),
              "s1r2_reference_grid_size": str(cfg["s1r2_reference_grid_size"]),
              "s1r2_trials": str(cfg["s1r2_trials"]),
              "s1r2_steps": str(cfg["s1r2_steps"]),
              "s1r2_repeats": str(cfg["s1r2_repeats"]),
              "s1r2_particle_counts": " ".join(str(value) for value in cfg["s1r2_particle_counts"]),
              "s3r3_grid_sizes": " ".join(str(value) for value in cfg["s3r3_grid_sizes"]),
              "s3r3_reference_grid_size": str(cfg["s3r3_reference_grid_size"]),
              "s3r3_trials": str(cfg["s3r3_trials"]),
              "s3r3_steps": str(cfg["s3r3_steps"]),
              "s3r3_primary_cell_sample_count": str(primary_cell_sample),
              "s3r3_cell_sample_counts_json": json.dumps(cfg["s3r3_cell_sample_counts"]),
              "stress_prior_kappas": " ".join(f"{value:g}" for value in cfg["stress_prior_kappas"]),
              "stress_body_increment_scales": " ".join(f"{value:g}" for value in cfg["stress_body_increment_scales"]),
              "stress_trials": str(cfg["stress_trials"]),
              "stress_steps": str(cfg["stress_steps"]),
              "retention_days": str(retention_days),
          }

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              for key, value in outputs.items():
                  print(f"{key}={value}", file=handle)

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary_path.write_text(
              "# Resolved paper-experiment parameters\n\n"
              + "\n".join(f"- `{key}`: `{value}`" for key, value in outputs.items())
              + "\n",
              encoding="utf-8",
          )
          PY

  sanity:
    name: Relevant tests and CLI sanity
    needs: parameters
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run relevant tests
        run: |
          mkdir -p test-results
          python -m pytest \
            --rootdir . \
            -q \
            --strict-config \
            --junitxml=test-results/junit-paper-experiments.xml \
            tests/test_quality_cost.py \
            tests/test_s3r3_relaxed_prototype.py \
            tests/test_s3r3_evidence_summary.py \
            tests/test_s3r3_stress_sweep.py

      - name: Verify CLI is available
        run: |
          se3plusplus-s3f --help > /dev/null
          python -m se3plusplus_s3f.cli --help > /dev/null

      - name: Upload sanity artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: paper-sanity-${{ github.run_number }}
          path: test-results
          if-no-files-found: warn
          retention-days: ${{ needs.parameters.outputs.retention_days }}

  s1r2-quality-cost:
    name: S1/R2 quality-cost report
    needs:
      - parameters
      - sanity
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      OUTPUT_DIR: results/paper_experiments/s1r2_quality_cost
      GRID_SIZES: ${{ needs.parameters.outputs.s1r2_grid_sizes }}
      REFERENCE_GRID_SIZE: ${{ needs.parameters.outputs.s1r2_reference_grid_size }}
      TRIALS: ${{ needs.parameters.outputs.s1r2_trials }}
      STEPS: ${{ needs.parameters.outputs.s1r2_steps }}
      REPEATS: ${{ needs.parameters.outputs.s1r2_repeats }}
      PARTICLE_COUNTS: ${{ needs.parameters.outputs.s1r2_particle_counts }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run S1/R2 quality-cost experiment
        run: |
          read -r -a grid_sizes <<< "$GRID_SIZES"
          read -r -a particle_counts <<< "$PARTICLE_COUNTS"
          python -m se3plusplus_s3f.cli quality-cost \
            --grid-sizes "${grid_sizes[@]}" \
            --reference-grid-size "$REFERENCE_GRID_SIZE" \
            --trials "$TRIALS" \
            --steps "$STEPS" \
            --repeats "$REPEATS" \
            --particle-counts "${particle_counts[@]}" \
            --output-dir "$OUTPUT_DIR"

      - name: Validate S1/R2 outputs
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          import os
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          required = {
              "metrics": output_dir / "quality_cost_metrics.csv",
              "claims": output_dir / "quality_cost_claims.csv",
              "pareto": output_dir / "quality_cost_pareto.csv",
              "metadata": output_dir / "run_metadata.json",
              "note": output_dir / "quality_cost_note.md",
          }
          if int(os.environ["REPEATS"]) > 1:
              required.update(
                  {
                      "repeat_pareto": output_dir / "quality_cost_repeat_pareto.csv",
                      "summary": output_dir / "quality_cost_summary.csv",
                      "pairwise": output_dir / "quality_cost_pairwise.csv",
                  }
              )
          missing = [label for label, path in required.items() if not path.exists()]
          if missing:
              raise FileNotFoundError(missing)

          metadata = json.loads(required["metadata"].read_text(encoding="utf-8"))
          if metadata["experiment"] != "quality_cost":
              raise AssertionError(metadata)
          if metadata["metrics_rows"] <= 0 or metadata["claims_rows"] <= 0 or metadata["pareto_rows"] <= 0:
              raise AssertionError(metadata)

          metrics = list(csv.DictReader(required["metrics"].open(newline="", encoding="utf-8")))
          for row in metrics:
              for column in ("position_rmse", "mean_nees", "coverage_95", "runtime_ms_per_step"):
                  if not math.isfinite(float(row[column])):
                      raise AssertionError(row)

          headline = ""
          pairwise_path = required.get("pairwise")
          if pairwise_path is not None:
              pairwise = list(csv.DictReader(pairwise_path.open(newline="", encoding="utf-8")))
              matches = [row for row in pairwise if row["pair_id"] == "r1_r2_8_vs_baseline_16"]
              if matches:
                  row = matches[0]
                  headline = (
                      f"R1+R2 8 vs baseline 16: RMSE delta "
                      f"{float(row['position_rmse_delta_mean']):.4f}, "
                      f"95% CI [{float(row['position_rmse_delta_ci95_low']):.4f}, "
                      f"{float(row['position_rmse_delta_ci95_high']):.4f}], "
                      f"wins {row['candidate_rmse_win_count']}/{row['n_repeats']}."
                  )

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(
              "# S1/R2 quality-cost validation\n\n"
              f"Validated `{len(metrics)}` metric rows in `{output_dir}`.\n\n"
              + (headline + "\n" if headline else ""),
              encoding="utf-8",
          )
          PY

      - name: Upload S1/R2 quality-cost artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-s1r2-quality-cost-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: ${{ needs.parameters.outputs.retention_days }}

  s3r3-evidence-summary:
    name: S3R3 evidence summary
    needs:
      - parameters
      - sanity
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OUTPUT_DIR: results/paper_experiments/s3r3_evidence_summary
      GRID_SIZES: ${{ needs.parameters.outputs.s3r3_grid_sizes }}
      REFERENCE_GRID_SIZE: ${{ needs.parameters.outputs.s3r3_reference_grid_size }}
      TRIALS: ${{ needs.parameters.outputs.s3r3_trials }}
      STEPS: ${{ needs.parameters.outputs.s3r3_steps }}
      CELL_SAMPLE_COUNT: ${{ needs.parameters.outputs.s3r3_primary_cell_sample_count }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run S3R3 evidence summary
        run: |
          read -r -a grid_sizes <<< "$GRID_SIZES"
          python -m se3plusplus_s3f.cli s3r3-evidence-summary \
            --grid-sizes "${grid_sizes[@]}" \
            --reference-grid-size "$REFERENCE_GRID_SIZE" \
            --trials "$TRIALS" \
            --steps "$STEPS" \
            --cell-sample-count "$CELL_SAMPLE_COUNT" \
            --output-dir "$OUTPUT_DIR"

      - name: Validate S3R3 evidence summary
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          import os
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          files = {
              "relaxed": output_dir / "s3r3_evidence_relaxed_metrics.csv",
              "highres": output_dir / "s3r3_evidence_highres_metrics.csv",
              "claims": output_dir / "s3r3_evidence_claims.csv",
              "metadata": output_dir / "run_metadata.json",
              "note": output_dir / "s3r3_evidence_summary_note.md",
          }
          missing = [label for label, path in files.items() if not path.exists()]
          if missing:
              raise FileNotFoundError(missing)

          metadata = json.loads(files["metadata"].read_text(encoding="utf-8"))
          if metadata["experiment"] != "s3r3_evidence_summary":
              raise AssertionError(metadata)

          grid_count = len(os.environ["GRID_SIZES"].split())
          expected_metric_rows = 3 * grid_count
          expected_claim_rows = 3 * grid_count
          if metadata["relaxed_metrics_rows"] != expected_metric_rows:
              raise AssertionError(metadata)
          if metadata["highres_metrics_rows"] != expected_metric_rows:
              raise AssertionError(metadata)
          if metadata["claims_rows"] != expected_claim_rows:
              raise AssertionError(metadata)

          claims = list(csv.DictReader(files["claims"].open(newline="", encoding="utf-8")))
          for row in claims:
              for column in ("position_rmse_gain_pct", "mean_nees_ratio", "coverage_delta", "runtime_ratio"):
                  if not math.isfinite(float(row[column])):
                      raise AssertionError(row)

          direct = [row for row in claims if row["evidence_source"] == "relaxed_truth" and row["candidate_variant"] == "r1_r2" and row["comparator_variant"] == "baseline"]
          headline = "; ".join(
              f"{row['grid_size']} cells: gain {float(row['position_rmse_gain_pct']):.1f}%, NEES ratio {float(row['mean_nees_ratio']):.3f}"
              for row in direct
          )
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "# S3R3 evidence-summary validation\n\n"
              f"Validated `{len(claims)}` claim rows in `{output_dir}`.\n\n"
              f"Direct R1+R2-vs-baseline claims: {headline}\n",
              encoding="utf-8",
          )
          PY

      - name: Upload S3R3 evidence-summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-s3r3-evidence-summary-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: ${{ needs.parameters.outputs.retention_days }}

  s3r3-cell-sample-convergence:
    name: S3R3 cell-sample convergence (${{ matrix.cell_sample_count }} samples)
    needs:
      - parameters
      - sanity
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        cell_sample_count: ${{ fromJson(needs.parameters.outputs.s3r3_cell_sample_counts_json) }}

    env:
      OUTPUT_DIR: results/paper_experiments/s3r3_cell_sample_${{ matrix.cell_sample_count }}
      GRID_SIZES: ${{ needs.parameters.outputs.s3r3_grid_sizes }}
      REFERENCE_GRID_SIZE: ${{ needs.parameters.outputs.s3r3_reference_grid_size }}
      TRIALS: ${{ needs.parameters.outputs.s3r3_trials }}
      STEPS: ${{ needs.parameters.outputs.s3r3_steps }}
      CELL_SAMPLE_COUNT: ${{ matrix.cell_sample_count }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run S3R3 evidence summary at this cell-sample count
        run: |
          read -r -a grid_sizes <<< "$GRID_SIZES"
          python -m se3plusplus_s3f.cli s3r3-evidence-summary \
            --grid-sizes "${grid_sizes[@]}" \
            --reference-grid-size "$REFERENCE_GRID_SIZE" \
            --trials "$TRIALS" \
            --steps "$STEPS" \
            --cell-sample-count "$CELL_SAMPLE_COUNT" \
            --no-plots \
            --output-dir "$OUTPUT_DIR"

      - name: Validate S3R3 cell-sample output
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          import os
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          files = {
              "claims": output_dir / "s3r3_evidence_claims.csv",
              "metadata": output_dir / "run_metadata.json",
              "note": output_dir / "s3r3_evidence_summary_note.md",
          }
          missing = [label for label, path in files.items() if not path.exists()]
          if missing:
              raise FileNotFoundError(missing)

          metadata = json.loads(files["metadata"].read_text(encoding="utf-8"))
          configured = metadata["config"]["prototype"]["cell_sample_count"]
          if int(configured) != int(os.environ["CELL_SAMPLE_COUNT"]):
              raise AssertionError(metadata)

          claims = list(csv.DictReader(files["claims"].open(newline="", encoding="utf-8")))
          for row in claims:
              if not math.isfinite(float(row["position_rmse_gain_pct"])):
                  raise AssertionError(row)

          supported = sum(row["supports_overall_claim"].lower() == "true" for row in claims)
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "# S3R3 cell-sample convergence validation\n\n"
              f"Cell samples: `{os.environ['CELL_SAMPLE_COUNT']}`. "
              f"Validated `{len(claims)}` claim rows; `{supported}` overall-support rows.\n",
              encoding="utf-8",
          )
          PY

      - name: Upload S3R3 cell-sample artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-s3r3-cell-sample-${{ matrix.cell_sample_count }}-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: ${{ needs.parameters.outputs.retention_days }}

  s3r3-stress-sweep:
    name: S3R3 stress sweep
    needs:
      - parameters
      - sanity
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OUTPUT_DIR: results/paper_experiments/s3r3_stress_sweep
      GRID_SIZES: ${{ needs.parameters.outputs.s3r3_grid_sizes }}
      PRIOR_KAPPAS: ${{ needs.parameters.outputs.stress_prior_kappas }}
      BODY_INCREMENT_SCALES: ${{ needs.parameters.outputs.stress_body_increment_scales }}
      TRIALS: ${{ needs.parameters.outputs.stress_trials }}
      STEPS: ${{ needs.parameters.outputs.stress_steps }}
      CELL_SAMPLE_COUNT: ${{ needs.parameters.outputs.s3r3_primary_cell_sample_count }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run S3R3 stress sweep
        run: |
          read -r -a grid_sizes <<< "$GRID_SIZES"
          read -r -a prior_kappas <<< "$PRIOR_KAPPAS"
          read -r -a body_increment_scales <<< "$BODY_INCREMENT_SCALES"
          python -m se3plusplus_s3f.cli s3r3-stress-sweep \
            --grid-sizes "${grid_sizes[@]}" \
            --prior-kappas "${prior_kappas[@]}" \
            --body-increment-scales "${body_increment_scales[@]}" \
            --trials "$TRIALS" \
            --steps "$STEPS" \
            --cell-sample-count "$CELL_SAMPLE_COUNT" \
            --output-dir "$OUTPUT_DIR"

      - name: Validate S3R3 stress-sweep outputs
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          import os
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          files = {
              "metrics": output_dir / "s3r3_stress_sweep_metrics.csv",
              "claims": output_dir / "s3r3_stress_sweep_claims.csv",
              "summary": output_dir / "s3r3_stress_sweep_summary.csv",
              "metadata": output_dir / "run_metadata.json",
              "note": output_dir / "s3r3_stress_sweep_note.md",
          }
          missing = [label for label, path in files.items() if not path.exists()]
          if missing:
              raise FileNotFoundError(missing)

          metadata = json.loads(files["metadata"].read_text(encoding="utf-8"))
          if metadata["experiment"] != "s3r3_stress_sweep":
              raise AssertionError(metadata)

          grid_count = len(os.environ["GRID_SIZES"].split())
          scenario_count = len(os.environ["PRIOR_KAPPAS"].split()) * len(os.environ["BODY_INCREMENT_SCALES"].split())
          expected_metrics = scenario_count * grid_count * 3
          expected_claims = scenario_count * grid_count * 2
          if metadata["metrics_rows"] != expected_metrics:
              raise AssertionError(metadata)
          if metadata["claims_rows"] != expected_claims:
              raise AssertionError(metadata)
          if metadata["summary_rows"] != scenario_count:
              raise AssertionError(metadata)

          claims = list(csv.DictReader(files["claims"].open(newline="", encoding="utf-8")))
          for row in claims:
              for column in ("position_rmse_gain_pct", "mean_nees_ratio", "coverage_delta", "runtime_ratio"):
                  if not math.isfinite(float(row[column])):
                      raise AssertionError(row)

          baseline = [row for row in claims if row["comparison"] == "R1+R2 vs baseline"]
          support = sum(row["supports_overall_claim"].lower() == "true" for row in baseline)
          best = max(baseline, key=lambda row: float(row["position_rmse_gain_pct"])) if baseline else None
          headline = ""
          if best is not None:
              headline = (
                  f"Largest baseline RMSE gain: {float(best['position_rmse_gain_pct']):.1f}% "
                  f"at {best['scenario_id']}, {best['grid_size']} cells."
              )

          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "# S3R3 stress-sweep validation\n\n"
              f"Validated `{len(claims)}` claim rows in `{output_dir}`.\n\n"
              f"Baseline-support rows: `{support}/{len(baseline)}`. {headline}\n",
              encoding="utf-8",
          )
          PY

      - name: Upload S3R3 stress-sweep artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-s3r3-stress-sweep-${{ github.run_number }}
          path: ${{ env.OUTPUT_DIR }}
          if-no-files-found: error
          retention-days: ${{ needs.parameters.outputs.retention_days }}

  summarize:
    name: Build combined experiment summary
    needs:
      - parameters
      - sanity
      - s1r2-quality-cost
      - s3r3-evidence-summary
      - s3r3-cell-sample-convergence
      - s3r3-stress-sweep
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Download experiment artifacts
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          path: downloaded_artifacts
          pattern: paper-*
          merge-multiple: false

      - name: Summarize downloaded artifacts
        run: |
          python - <<'PY'
          import csv
          import json
          import math
          from pathlib import Path

          root = Path("downloaded_artifacts")
          report = [
              "# Paper experiment suite summary",
              "",
              "This summary was generated from the uploaded workflow artifacts.",
              "",
          ]

          if not root.exists():
              report.append("No artifacts were downloaded. Check failed jobs above.")
          else:
              report.append("## Artifact directories")
              report.append("")
              for path in sorted(p for p in root.iterdir() if p.is_dir()):
                  report.append(f"- `{path}`")
              report.append("")

          pairwise_paths = sorted(root.rglob("quality_cost_pairwise.csv")) if root.exists() else []
          if pairwise_paths:
              rows = list(csv.DictReader(pairwise_paths[0].open(newline="", encoding="utf-8")))
              report.append("## S1/R2 headline pairwise claim")
              report.append("")
              matches = [row for row in rows if row["pair_id"] == "r1_r2_8_vs_baseline_16"]
              if matches:
                  row = matches[0]
                  report.append(
                      "`R1+R2` 8 cells vs baseline 16 cells: "
                      f"RMSE delta `{float(row['position_rmse_delta_mean']):.4f}`, "
                      f"95% CI `[{float(row['position_rmse_delta_ci95_low']):.4f}, {float(row['position_rmse_delta_ci95_high']):.4f}]`, "
                      f"wins `{row['candidate_rmse_win_count']}/{row['n_repeats']}`, "
                      f"runtime ratio `{float(row['runtime_ratio_mean']):.3f}`."
                  )
              else:
                  report.append("The `r1_r2_8_vs_baseline_16` pairwise row was not present.")
              report.append("")

          s3r3_claim_paths = sorted(root.rglob("s3r3_evidence_claims.csv")) if root.exists() else []
          primary_claim_paths = [path for path in s3r3_claim_paths if "cell-sample" not in str(path)] or s3r3_claim_paths[:1]
          if primary_claim_paths:
              rows = list(csv.DictReader(primary_claim_paths[0].open(newline="", encoding="utf-8")))
              report.append("## S3R3 direct-truth R1+R2-vs-baseline claims")
              report.append("")
              for row in rows:
                  if row.get("evidence_source") == "relaxed_truth" and row.get("candidate_variant") == "r1_r2" and row.get("comparator_variant") == "baseline":
                      report.append(
                          f"- `{row['grid_size']}` cells: RMSE gain `{float(row['position_rmse_gain_pct']):.1f}%`, "
                          f"NEES ratio `{float(row['mean_nees_ratio']):.3f}`, coverage delta `{float(row['coverage_delta']):.3f}`."
                      )
              report.append("")

          convergence = []
          for metadata_path in sorted(root.rglob("run_metadata.json")) if root.exists() else []:
              try:
                  metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  continue
              if metadata.get("experiment") == "s3r3_evidence_summary":
                  sample_count = metadata.get("config", {}).get("prototype", {}).get("cell_sample_count")
                  claims_path = metadata_path.parent / "s3r3_evidence_claims.csv"
                  if sample_count is not None and claims_path.exists():
                      rows = list(csv.DictReader(claims_path.open(newline="", encoding="utf-8")))
                      direct_gains = [
                          float(row["position_rmse_gain_pct"])
                          for row in rows
                          if row.get("evidence_source") == "relaxed_truth"
                          and row.get("candidate_variant") == "r1_r2"
                          and row.get("comparator_variant") == "baseline"
                      ]
                      if direct_gains:
                          convergence.append((int(sample_count), sum(direct_gains) / len(direct_gains)))
          if convergence:
              report.append("## S3R3 cell-sample convergence check")
              report.append("")
              for sample_count, mean_gain in sorted(set(convergence)):
                  report.append(f"- `{sample_count}` samples: mean direct-truth RMSE gain `{mean_gain:.1f}%`.")
              report.append("")

          stress_paths = sorted(root.rglob("s3r3_stress_sweep_summary.csv")) if root.exists() else []
          if stress_paths:
              rows = list(csv.DictReader(stress_paths[0].open(newline="", encoding="utf-8")))
              report.append("## S3R3 stress-sweep scenario summary")
              report.append("")
              best = max(rows, key=lambda row: float(row["baseline_mean_rmse_gain_pct"])) if rows else None
              if best:
                  report.append(
                      f"Best mean baseline RMSE gain: `{float(best['baseline_mean_rmse_gain_pct']):.1f}%` "
                      f"in scenario `{best['scenario_id']}`."
                  )
              supports = sum(int(row["baseline_overall_supports"]) for row in rows)
              comparisons = sum(int(row["baseline_comparisons"]) for row in rows)
              report.append(f"Baseline comparison support: `{supports}/{comparisons}` grid/scenario rows.")
              report.append("")

          output = Path("paper_experiment_summary.md")
          output.write_text("\n".join(report) + "\n", encoding="utf-8")
          Path("GITHUB_STEP_SUMMARY.txt").write_text(output.read_text(encoding="utf-8"), encoding="utf-8")
          PY
          cat paper_experiment_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: paper-experiment-suite-summary-${{ github.run_number }}
          path: |
            paper_experiment_summary.md
            downloaded_artifacts
          if-no-files-found: warn
          retention-days: ${{ needs.parameters.outputs.retention_days }}
