name: SE3PlusPlusS3F CI

on:
  push:
    branches:
      - main
    paths:
      - "src/se3plusplus_s3f/**"
      - "configs/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/se3plusplus-s3f-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/se3plusplus_s3f/**"
      - "configs/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/se3plusplus-s3f-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  tests-and-smoke:
    name: Tests + S3F smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: |
          mkdir -p test-results
          python -m pytest \
            --rootdir . \
            -q \
            --strict-config \
            --junitxml=test-results/junit-py${{ matrix.python-version }}.xml \
            tests

      - name: Run relaxed S3F CLI smoke experiment
        run: |
          python -m se3plusplus_s3f.cli \
            relaxed-s3f \
            --grid-sizes 8 \
            --trials 1 \
            --steps 2 \
            --no-plots \
            --output-dir ci_smoke/relaxed_s3f_pilot

      - name: Validate relaxed S3F smoke outputs
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          output_dir = Path("ci_smoke/relaxed_s3f_pilot")
          metrics_path = output_dir / "relaxed_s3f_metrics.csv"
          metadata_path = output_dir / "run_metadata.json"
          note_path = output_dir / "relaxed_s3f_pilot_note.md"

          assert metrics_path.exists(), metrics_path
          assert metadata_path.exists(), metadata_path
          assert note_path.exists(), note_path

          rows = list(csv.DictReader(metrics_path.open(newline="", encoding="utf-8")))
          assert len(rows) == 3
          assert {row["variant"] for row in rows} == {"baseline", "r1", "r1_r2"}
          assert all(row["grid_size"] == "8" for row in rows)
          assert all(float(row["position_rmse"]) >= 0.0 for row in rows)

          print("Smoke rows:", rows)
          PY

      - name: Run high-resolution reference CLI smoke
        if: matrix.python-version == '3.11'
        run: |
          python -m se3plusplus_s3f.cli \
            highres-reference \
            --grid-sizes 8 \
            --reference-grid-size 16 \
            --trials 1 \
            --steps 2 \
            --no-plots \
            --output-dir ci_smoke/highres_reference

      - name: Validate high-resolution reference smoke outputs
        if: matrix.python-version == '3.11'
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          output_dir = Path("ci_smoke/highres_reference")
          metrics_path = output_dir / "highres_reference_metrics.csv"
          metadata_path = output_dir / "run_metadata.json"
          note_path = output_dir / "highres_reference_note.md"

          for required_path in (metrics_path, metadata_path, note_path):
              if not required_path.exists():
                  raise FileNotFoundError(required_path)

          rows = list(csv.DictReader(metrics_path.open(newline="", encoding="utf-8")))
          if len(rows) != 3:
              raise AssertionError(rows)
          variants = {row["variant"] for row in rows}
          if variants != {"baseline", "r1", "r1_r2"}:
              raise AssertionError(variants)
          for row in rows:
              assert row["grid_size"] == "8", row
              assert row["reference_grid_size"] == "16", row
              assert float(row["position_rmse_to_reference"]) >= 0.0, row

          print("High-resolution reference rows:", rows)
          PY

      - name: Run baseline comparison CLI smoke
        if: matrix.python-version == '3.11'
        run: |
          python -m se3plusplus_s3f.cli \
            compare-baselines \
            --grid-sizes 8 \
            --trials 1 \
            --steps 2 \
            --particle-count 64 \
            --no-plots \
            --output-dir ci_smoke/baseline_comparison

      - name: Validate baseline comparison smoke outputs
        if: matrix.python-version == '3.11'
        run: |
          python - <<'PY'
          import csv
          import math
          from pathlib import Path

          output_dir = Path("ci_smoke/baseline_comparison")
          metrics_path = output_dir / "baseline_comparison_metrics.csv"
          metadata_path = output_dir / "run_metadata.json"
          note_path = output_dir / "baseline_comparison_note.md"

          for required_path in (metrics_path, metadata_path, note_path):
              if not required_path.exists():
                  raise FileNotFoundError(required_path)

          rows = list(csv.DictReader(metrics_path.open(newline="", encoding="utf-8")))
          if len(rows) != 5:
              raise AssertionError(rows)
          filters = {row["filter"] for row in rows}
          if filters != {"s3f", "ekf", "particle_filter"}:
              raise AssertionError(filters)
          for row in rows:
              assert math.isfinite(float(row["position_rmse"])), row
              assert math.isfinite(float(row["orientation_mean_error_rad"])), row
              assert float(row["runtime_ms_per_step"]) > 0.0, row

          print("Baseline comparison rows:", rows)
          PY

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: junit-py${{ matrix.python-version }}
          path: test-results/junit-py${{ matrix.python-version }}.xml

      - name: Upload S3F smoke artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: se3plusplus-s3f-smoke
          path: |
            ci_smoke/relaxed_s3f_pilot
            ci_smoke/highres_reference
            ci_smoke/baseline_comparison

  package-smoke:
    name: Build package and run CLI entry point
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install built wheel with dependencies
        run: |
          python -m pip install --force-reinstall dist/*.whl

      - name: Verify CLI entry point from built package
        run: |
          se3plusplus-s3f --help > /dev/null
          se3plusplus-s3f \
            relaxed-s3f \
            --config configs/relaxed_s3f_pilot.json \
            --grid-sizes 8 \
            --trials 1 \
            --steps 2 \
            --no-plots \
            --output-dir package_smoke/relaxed_s3f_pilot

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: se3plusplus-s3f-package-dist
          path: dist/*
